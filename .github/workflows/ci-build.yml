name: CI Build
'on':
  pull_request:
    branches:
    - main
    - master
  push:
    branches:
    - main
    - master
permissions:
  contents: read
  pull-requests: read
  packages: write
  id-token: write
jobs:
  ci-build:
    uses: ./.github/workflows/ci-build-reusable.yml
    with:
      services: '[{''name'': ''output'', ''build_context'': ''output'', ''dockerfile'': ''Dockerfile''}]'
      registries: '[]'
    secrets: inherit
