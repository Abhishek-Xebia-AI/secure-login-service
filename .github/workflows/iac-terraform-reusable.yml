name: Terraform IaC (Reusable)
'on':
  workflow_call:
    inputs:
      terraform_version:
        description: Terraform version to use
        required: false
        type: string
        default: '1.7'
      working_directory:
        description: Terraform working directory
        required: false
        type: string
        default: .
permissions:
  id-token: write
  contents: read
  pull-requests: write
  issues: write
env:
  TF_IN_AUTOMATION: 'true'
jobs:
  fmt:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
    - name: Terraform Format Check
      run: terraform fmt -check -recursive
  validate:
    runs-on: ubuntu-latest
    needs:
    - fmt
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
    - name: Terraform Init
      run: terraform init -backend=false
    - name: Terraform Validate
      run: terraform validate
  trivy-config:
    runs-on: ubuntu-latest
    needs:
    - validate
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Run Trivy config scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: config
        scan-ref: ${{ inputs.working_directory }}
        format: sarif
        output: trivy-iac-results.sarif
        severity: CRITICAL,HIGH
        exit-code: '1'
    - name: Upload Trivy scan results
      uses: github/codeql-action/upload-sarif@v3
      if: always()
      with:
        sarif_file: trivy-iac-results.sarif
  tflint:
    runs-on: ubuntu-latest
    needs:
    - validate
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup TFLint
      uses: terraform-linters/setup-tflint@v4
    - name: Initialize TFLint
      run: tflint --init
      working-directory: ${{ inputs.working_directory }}
    - name: Run TFLint
      run: tflint --format=compact
      working-directory: ${{ inputs.working_directory }}
  plan-dev:
    runs-on: ubuntu-latest
    needs:
    - trivy-config
    - tflint
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
    - name: Terraform Init (dev)
      run: terraform init -backend-config=backends/dev.hcl
      working-directory: ${{ inputs.working_directory }}
    - name: Terraform Plan (dev)
      id: plan
      run: terraform plan -var-file=environments/dev.tfvars -out=tfplan-dev -no-color
      working-directory: ${{ inputs.working_directory }}
      continue-on-error: true
    - name: Post Plan to PR (dev)
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: "const output = `#### Terraform Plan - dev\n\\n\\n\\`\\`\\`\\n${process.env.PLAN_OUTPUT}\\n\\`\\`\\`\n\\n\\\
          n*Pushed by: @${{ github.actor }}, Action: \\`${{ github.event_name }}\\`*`;\n\ngithub.rest.issues.createComment({\n\
          \  issue_number: context.issue.number,\n  owner: context.repo.owner,\n  repo: context.repo.repo,\n  body: output\n\
          });"
  plan-staging:
    runs-on: ubuntu-latest
    needs:
    - trivy-config
    - tflint
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
    - name: Terraform Init (staging)
      run: terraform init -backend-config=backends/staging.hcl
      working-directory: ${{ inputs.working_directory }}
    - name: Terraform Plan (staging)
      id: plan
      run: terraform plan -var-file=environments/staging.tfvars -out=tfplan-staging -no-color
      working-directory: ${{ inputs.working_directory }}
      continue-on-error: true
    - name: Post Plan to PR (staging)
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: "const output = `#### Terraform Plan - staging\n\\n\\n\\`\\`\\`\\n${process.env.PLAN_OUTPUT}\\n\\`\\`\\`\n\
          \\n\\n*Pushed by: @${{ github.actor }}, Action: \\`${{ github.event_name }}\\`*`;\n\ngithub.rest.issues.createComment({\n\
          \  issue_number: context.issue.number,\n  owner: context.repo.owner,\n  repo: context.repo.repo,\n  body: output\n\
          });"
  plan-prod:
    runs-on: ubuntu-latest
    needs:
    - trivy-config
    - tflint
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
    - name: Terraform Init (prod)
      run: terraform init -backend-config=backends/prod.hcl
      working-directory: ${{ inputs.working_directory }}
    - name: Terraform Plan (prod)
      id: plan
      run: terraform plan -var-file=environments/prod.tfvars -out=tfplan-prod -no-color
      working-directory: ${{ inputs.working_directory }}
      continue-on-error: true
    - name: Post Plan to PR (prod)
      uses: actions/github-script@v7
      if: github.event_name == 'pull_request'
      with:
        script: "const output = `#### Terraform Plan - prod\n\\n\\n\\`\\`\\`\\n${process.env.PLAN_OUTPUT}\\n\\`\\`\\`\n\\\
          n\\n*Pushed by: @${{ github.actor }}, Action: \\`${{ github.event_name }}\\`*`;\n\ngithub.rest.issues.createComment({\n\
          \  issue_number: context.issue.number,\n  owner: context.repo.owner,\n  repo: context.repo.repo,\n  body: output\n\
          });"
  apply-dev:
    runs-on: ubuntu-latest
    needs:
    - plan-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
    - name: Terraform Init (dev)
      run: terraform init -backend-config=backends/dev.hcl
      working-directory: ${{ inputs.working_directory }}
    - name: Terraform Apply (dev)
      run: terraform apply -var-file=environments/dev.tfvars -auto-approve -no-color
      working-directory: ${{ inputs.working_directory }}
  apply-staging:
    runs-on: ubuntu-latest
    needs:
    - plan-staging
    - apply-dev
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
    - name: Terraform Init (staging)
      run: terraform init -backend-config=backends/staging.hcl
      working-directory: ${{ inputs.working_directory }}
    - name: Terraform Apply (staging)
      run: terraform apply -var-file=environments/staging.tfvars -auto-approve -no-color
      working-directory: ${{ inputs.working_directory }}
  apply-prod:
    runs-on: ubuntu-latest
    needs:
    - plan-prod
    - apply-staging
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ inputs.terraform_version }}
    - name: Terraform Init (prod)
      run: terraform init -backend-config=backends/prod.hcl
      working-directory: ${{ inputs.working_directory }}
    - name: Terraform Apply (prod)
      run: terraform apply -var-file=environments/prod.tfvars -auto-approve -no-color
      working-directory: ${{ inputs.working_directory }}
    environment: prod
