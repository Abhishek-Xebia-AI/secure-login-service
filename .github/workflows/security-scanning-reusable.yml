name: Security Scanning - Snyk (Reusable)
'on':
  workflow_call:
    inputs:
      scan_types:
        description: Comma-separated list of scan types to run (sca,container,sast,iac,sbom)
        required: false
        type: string
        default: sca,container,sast,iac,sbom
      severity_threshold:
        description: Minimum severity to fail on (CRITICAL,HIGH,MEDIUM,LOW)
        required: false
        type: string
        default: CRITICAL,HIGH
permissions:
  contents: read
  security-events: write
  id-token: write
env:
  SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
jobs:
  sca:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Snyk CLI
      run: npm install -g snyk && snyk auth $SNYK_TOKEN
    - name: Snyk SCA scan - output/pom.xml
      run: snyk test --severity-threshold=high --file=output/pom.xml
  container:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Snyk CLI
      run: npm install -g snyk && snyk auth $SNYK_TOKEN
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    - name: Build image for scanning
      uses: docker/build-push-action@v5
      with:
        context: output
        file: output/Dockerfile
        push: false
        load: true
        tags: scan-target:${{ github.sha }}
    - name: Snyk Container scan
      run: snyk container test --severity-threshold=high scan-target:${{ github.sha }}
  sast:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Snyk CLI
      run: npm install -g snyk && snyk auth $SNYK_TOKEN
    - name: Snyk SAST scan
      run: snyk code test --severity-threshold=high
  sbom:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up Snyk CLI
      run: npm install -g snyk && snyk auth $SNYK_TOKEN
    - name: Generate SBOM (Snyk)
      run: snyk sbom --file=output/pom.xml --format=cyclonedx1.4+json > sbom.cyclonedx.json
    - name: Upload SBOM as artifact
      uses: actions/upload-artifact@v4
      with:
        name: sbom
        path: sbom.cyclonedx.json
